  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- 底部小鱼 -->
    <style>
      html, body {
        margin: 0 !important;
        padding: 0 !important;
        overflow-x: hidden !important;
      }
      #jsi-flying-fish-container {
        position: fixed !important;
        bottom: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 150px !important;
        z-index: 9999 !important;
        pointer-events: none !important;
        padding: 0 !important;
        margin: 0 !important;
      }
    </style>
    <div id="jsi-flying-fish-container"></div>

    <!-- 看板娘 -->
    <script src="/scripts/L2Dwidget.0.min.js"></script>
    <script src="/scripts/L2Dwidget.min.js"></script>
      <script>
      L2Dwidget.init({
          "model": {
              jsonPath: "https://unpkg.com/live2d-widget-model-hijiki@1.0.5/assets/hijiki.model.json",
              "scale": 1
          },
          "display": {
              "position": "left",
              "width": 100,
              "height": 200,
              "hOffset": 70,
              "vOffset": 0
          },
          "mobile": {
              "show": true,
              "scale": 0.5
          },
          "react": {
              "opacityDefault": 0.7,
              "opacityOnHover": 0.2
          }
      });
  window.onload = function(){
       $("#live2dcanvas").attr("style","position: fixed; opacity: 0.7; left: 70px; bottom: 0px; z-index: 1; pointer-events: none;")
  }
  </script>
  <div style="position: fixed; bottom: 10px; right: 10px; display: flex; align-items: center; gap: 5px; z-index: 10000; font-size: 12px; color: #666;">
